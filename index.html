<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoTime — Suivi des heures</title>
<meta name="description" content="CoTime : notez vos heures de travail et exportez un PDF récapitulatif. Simple, sans compte.">
<meta name="theme-color" content="#f9f9f9">
<link rel="icon" type="image/svg+xml" href="assets/favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon/favicon-96x96.png">
<link rel="shortcut icon" href="assets/favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
<link rel="manifest" href="assets/favicon/site.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  :root{
    --azure:#1D4ED8; --azure-dark:#1740b0; --pollen:#FFCB47;
    --carbon:#1E1E1E; --gunmetal:#393D3F; --snow:#F9F9F9;
    --card:#ffffff; --border:#e7e7ec; --muted:#6b6f76;
    --radius:14px; --shadow:0 1px 3px rgba(30,30,30,.06), 0 6px 20px rgba(30,30,30,.05);
  }
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin:0; }
  body {
    background: var(--snow); color: var(--carbon);
    font-family: 'Inter', system-ui, sans-serif; font-size:15px; line-height:1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family:'JetBrains Mono', ui-monospace, monospace; }

  /* inputs */
  input[type="date"], input[type="time"], input[type="text"], input[type="number"], select {
    width:100%; border:1.5px solid var(--border); border-radius:10px;
    padding:11px 12px; font-size:15px; background:#fff; color:var(--carbon);
    outline:none; font-family:'JetBrains Mono', monospace; transition:border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus { border-color:var(--azure); box-shadow:0 0 0 3px rgba(29,78,216,.12); }
  label { font-family:'Inter', sans-serif; }

  /* buttons */
  .btn { font-family:'Inter',sans-serif; font-weight:600; border-radius:10px; cursor:pointer;
    border:1.5px solid transparent; padding:11px 18px; font-size:14px; transition:background .15s, border-color .15s, color .15s; display:inline-flex; align-items:center; gap:8px; justify-content:center; }
  .btn-primary { background:var(--azure); color:#fff; }
  .btn-primary:hover { background:var(--azure-dark); }
  .btn-outline { background:#fff; color:var(--azure); border-color:var(--azure); }
  .btn-outline:hover { background:rgba(29,78,216,.07); }
  .btn-ghost { background:transparent; color:var(--gunmetal); border-color:var(--border); }
  .btn-ghost:hover { background:#f0f0f3; }
  .btn-sm { padding:8px 12px; font-size:13px; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); }

  .eyebrow { font-family:'JetBrains Mono',monospace; font-size:12px; letter-spacing:.5px; color:var(--azure); font-weight:600; margin:0 0 6px; }
  .sec-num { font-family:'JetBrains Mono',monospace; font-size:13px; font-weight:700; color:var(--pollen); background:var(--carbon); border-radius:7px; padding:3px 8px; }
  .sec-title { font-family:'Inter',sans-serif; font-weight:700; font-size:18px; margin:0; }

  a { color:var(--azure); }

  ::placeholder { color:#b3b6bd; }
  @media (max-width:560px){ body{ font-size:14px; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useRef, useEffect } = React;

const MONTHS_FR = ["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const pad = (n) => String(n).padStart(2, "0");
const uid = () => Date.now() + Math.floor(Math.random() * 1000);

const calcDuration = (start, end) => {
  if (!start || !end) return null;
  const toMins = (t) => { const [h, m] = t.split(":").map(Number); return h * 60 + (m || 0); };
  let diff = toMins(end) - toMins(start);
  if (diff <= 0) diff += 24 * 60;
  return diff > 0 ? diff : null;
};

const minToStr = (mins) => {
  const h = Math.floor(mins / 60), m = mins % 60;
  return m === 0 ? `${h}h` : `${h}h${pad(m)}`;
};

const euro = (n) => n.toLocaleString("fr-FR", { style: "currency", currency: "EUR" });
const computePay = (mins, rate) => (rate == null || isNaN(rate)) ? null : (mins / 60) * rate;

const formatDate = (dateStr) =>
  new Date(dateStr + "T00:00:00").toLocaleDateString("fr-FR", { weekday: "long", day: "numeric", month: "long" });
const formatDateShort = (dateStr) =>
  new Date(dateStr + "T00:00:00").toLocaleDateString("fr-FR", { day: "numeric", month: "short", year: "numeric" });

const getMonthKey = (dateStr) => dateStr.slice(0, 7);
const getMonthLabel = (key) => { const [y, m] = key.split("-"); return `${MONTHS_FR[parseInt(m,10)-1]} ${y}`; };
const todayStr = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const emptySlot = () => ({ start: "", end: "" });

// ---- Persistance (localStorage) ----
const STORAGE_KEY = "cotime.v2";
const newProject = (name) => ({ id: uid(), name: name || "Mon employeur", rate: null, entries: [] });
const freshState = () => { const p = newProject("Mon employeur"); return { version: 2, user: { name: "" }, activeProjectId: p.id, projects: [p] }; };

const loadState = () => {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return freshState();
    const s = JSON.parse(raw);
    if (!s || !Array.isArray(s.projects) || !s.projects.length) return freshState();
    if (!s.user) s.user = { name: "" };
    if (!s.projects.find((p) => p.id === s.activeProjectId)) s.activeProjectId = s.projects[0].id;
    return s;
  } catch { return freshState(); }
};
const saveState = (s) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} };

// ---- CSV (compat + migration data.csv) ----
const entriesToCSV = (entries) => {
  const header = "id,date,slot_index,start,end,duration_mins,note,total_duration_mins";
  const rows = [];
  for (const entry of entries) {
    for (let i = 0; i < entry.slots.length; i++) {
      const s = entry.slots[i];
      const note = (entry.note || "").replace(/"/g, '""');
      rows.push(`${entry.id},${entry.date},${i},${s.start},${s.end},${s.duration},"${note}",${entry.totalDuration}`);
    }
  }
  return header + "\n" + rows.join("\n");
};
const downloadText = (text, filename, mime) => {
  const blob = new Blob([text], { type: (mime || "text/plain") + ";charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
};
const csvToEntries = (text) => {
  const lines = text.trim().split("\n").slice(1);
  const map = {};
  for (const line of lines) {
    const cols = [];
    let cur = "", inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === "," && !inQ) { cols.push(cur); cur = ""; }
      else { cur += c; }
    }
    cols.push(cur);
    const [id, date, slot_index, start, end, duration_mins, note, total_duration_mins] = cols;
    if (!id || !date) continue;
    if (!map[id]) map[id] = { id: Number(id), date, slots: [], note: (note||"").replace(/""/g,'"'), totalDuration: Number(total_duration_mins) };
    map[id].slots[Number(slot_index)] = { start, end, duration: Number(duration_mins) };
  }
  return Object.values(map).sort((a,b) => a.date.localeCompare(b.date));
};

// ---- Export PDF ----
const exportMonthPDF = (monthKey, monthEntries, meta) => {
  const label = getMonthLabel(monthKey);
  const total = monthEntries.reduce((s,e) => s + e.totalDuration, 0);
  const rows = monthEntries.map((entry) => {
    const horaires = entry.slots.map((s) => `${s.start.replace(":", "h")} → ${s.end.replace(":", "h")}`).join("<br>");
    return `<tr><td>${formatDateShort(entry.date)}</td><td>${horaires}</td><td>${minToStr(entry.totalDuration)}</td></tr>`;
  }).join("");

  const subtitleParts = [meta.userName, meta.projectName].filter(Boolean);
  const subtitle = subtitleParts.length ? `<p class="sub">${subtitleParts.join(" · ")}</p>` : "";

  const html = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"><title>${label}</title>
<style>
  @page { margin: 1.5cm; }
  body { font-family: Arial, sans-serif; font-size: 13px; color: #111; margin: 0; }
  h2 { font-size: 17px; color:#1E1E1E; margin:0 0 2px; }
  .sub { color:#393D3F; margin:0 0 18px; font-size:13px; }
  .wrap { width: 100%; }
  table { width: 100%; border-collapse: collapse; }
  th { background:#efefef !important; -webkit-print-color-adjust: exact; print-color-adjust: exact;
    color:#111; padding: 8px 12px; font-size: 12px; border: 1px solid #bbb; }
  td { padding: 9px 12px; border: 1px solid #ccc; vertical-align: middle; text-align: center; }
  tr:nth-child(even) td { background:#f6f6f6 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  .total { margin-top: 14px; font-weight: bold; font-size: 14px; }
</style></head><body>
<div class="wrap">
<h2>${label}</h2>${subtitle}
<table><thead><tr><th>Date</th><th>Horaire</th><th>Nombre d'heures</th></tr></thead>
<tbody>${rows}</tbody></table>
<p class="total">Total heures ${label} : ${minToStr(total)}</p>
</div>
</body></html>`;

  const w = window.open("", "_blank");
  w.document.write(html);
  w.document.close();
  w.focus();
  setTimeout(() => w.print(), 400);
};

// ---- Composant principal ----
function App() {
  const [state, setState] = useState(loadState);
  const [date, setDate] = useState(todayStr());
  const [slots, setSlots] = useState([emptySlot()]);
  const [note, setNote] = useState("");
  const [error, setError] = useState("");
  const [msg, setMsg] = useState({ text: "", ok: true });
  const [showSettings, setShowSettings] = useState(false);
  const [expanded, setExpanded] = useState(() => ({ [todayStr().slice(0,7)]: true }));
  const csvRef = useRef(null);
  const jsonRef = useRef(null);

  const toggleMonth = (key) => setExpanded((e) => ({ ...e, [key]: !e[key] }));

  useEffect(() => { saveState(state); }, [state]);

  const activeProject = state.projects.find((p) => p.id === state.activeProjectId) || state.projects[0];
  const entries = activeProject.entries;
  const rate = activeProject.rate;

  const flash = (text, ok = true) => { setMsg({ text, ok }); setTimeout(() => setMsg({ text: "", ok: true }), 3200); };

  const updateActiveProject = (updater) =>
    setState((s) => ({ ...s, projects: s.projects.map((p) => (p.id === s.activeProjectId ? updater(p) : p)) }));
  const setEntries = (next) => updateActiveProject((p) => ({ ...p, entries: next }));

  // --- projets ---
  const switchProject = (id) => setState((s) => ({ ...s, activeProjectId: id }));
  const addProject = () => {
    const name = window.prompt("Nom du nouvel employeur ?", "");
    if (name === null) return;
    const p = newProject(name.trim() || "Nouvel employeur");
    setState((s) => ({ ...s, projects: [...s.projects, p], activeProjectId: p.id }));
  };
  const deleteProject = () => {
    if (state.projects.length <= 1) { window.alert("Impossible de supprimer le dernier employeur."); return; }
    if (!window.confirm(`Supprimer l'employeur « ${activeProject.name} » et toutes ses heures ?`)) return;
    setState((s) => { const projects = s.projects.filter((p) => p.id !== s.activeProjectId); return { ...s, projects, activeProjectId: projects[0].id }; });
    setShowSettings(false);
  };
  const renameProject = (name) => updateActiveProject((p) => ({ ...p, name }));
  const setRate = (val) => updateActiveProject((p) => ({ ...p, rate: val === "" ? null : Number(val) }));
  const setUserName = (name) => setState((s) => ({ ...s, user: { ...s.user, name } }));

  // --- créneaux ---
  const updateSlot = (i, field, val) => { setSlots((p) => p.map((s,idx) => idx===i ? {...s,[field]:val} : s)); setError(""); };
  const addSlot = () => setSlots((p) => [...p, emptySlot()]);
  const removeSlot = (i) => setSlots((p) => p.filter((_,idx) => idx!==i));
  const totalDuration = slots.reduce((s, sl) => s + (calcDuration(sl.start, sl.end)||0), 0);

  const handleAdd = () => {
    if (!date) { setError("Renseigne la date."); return; }
    const valid = slots.filter((s) => s.start && s.end);
    if (!valid.length) { setError("Ajoute au moins un créneau avec début et fin."); return; }
    const newEntry = {
      id: uid(), date,
      slots: valid.map((s) => ({ ...s, duration: calcDuration(s.start, s.end) })),
      note,
      totalDuration: valid.reduce((s,sl) => s+(calcDuration(sl.start,sl.end)||0), 0),
    };
    setEntries([...entries, newEntry].sort((a,b) => a.date.localeCompare(b.date)));
    setSlots([emptySlot()]); setNote(""); setError("");
  };

  const handleDelete = (id) => setEntries(entries.filter((e) => e.id !== id));

  // --- import / export ---
  const exportCSV = () => downloadText(entriesToCSV(entries), `cotime-${activeProject.name.replace(/\s+/g,"_")}.csv`, "text/csv");
  const handleImportCSV = (e) => {
    const file = e.target.files[0]; e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = csvToEntries(ev.target.result);
        if (!parsed.length) { flash("Fichier CSV vide ou invalide.", false); return; }
        if (entries.length && !window.confirm(`Remplacer les heures de l'employeur « ${activeProject.name} » par le CSV importé ?`)) return;
        setEntries(parsed);
        flash(`✓ ${parsed.length} entrée(s) importée(s)`);
      } catch { flash("Erreur de lecture du CSV.", false); }
    };
    reader.readAsText(file);
  };
  const exportBackup = () => downloadText(JSON.stringify(state, null, 2), "cotime-sauvegarde.json", "application/json");
  const handleImportBackup = (e) => {
    const file = e.target.files[0]; e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        if (!parsed || !Array.isArray(parsed.projects) || !parsed.projects.length) { flash("Sauvegarde invalide.", false); return; }
        if (!window.confirm("Restaurer cette sauvegarde ? Les données actuelles seront remplacées.")) return;
        if (!parsed.user) parsed.user = { name: "" };
        if (!parsed.projects.find((p) => p.id === parsed.activeProjectId)) parsed.activeProjectId = parsed.projects[0].id;
        setState(parsed);
        setShowSettings(false);
        flash("✓ Sauvegarde restaurée");
      } catch { flash("Erreur de lecture de la sauvegarde.", false); }
    };
    reader.readAsText(file);
  };

  // --- regroupement ---
  const byMonth = useMemo(() => {
    const map = {};
    for (const e of entries) { const k = getMonthKey(e.date); if (!map[k]) map[k]=[]; map[k].push(e); }
    return map;
  }, [entries]);
  const monthKeys = Object.keys(byMonth).sort().reverse();
  const totalMonth = (k) => byMonth[k].reduce((s,e) => s+e.totalDuration, 0);

  const grandTotal = entries.reduce((s,e) => s+e.totalDuration, 0);
  const curMonthKey = todayStr().slice(0,7);
  const curMonthTotal = (byMonth[curMonthKey] || []).reduce((s,e) => s+e.totalDuration, 0);
  const curMonthPay = computePay(curMonthTotal, rate);

  const pdfMeta = { userName: state.user.name, projectName: activeProject.name, rate };

  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column" }}>
      <div style={{ flex:1, width:"100%", maxWidth:680, margin:"0 auto", padding:"28px 16px 8px" }}>

        {/* Header */}
        <header style={{ marginBottom:22 }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", gap:12 }}>
            <span className="mono" style={{ fontSize:26, fontWeight:700, color:"var(--gunmetal)", letterSpacing:"-.5px" }}>CoTime</span>
            <button className="btn btn-ghost btn-sm" onClick={() => setShowSettings(true)} aria-label="Réglages">⚙ Réglages</button>
          </div>
          {state.user.name && (
            <p className="mono" style={{ margin:"8px 2px 0", color:"var(--muted)", fontSize:13 }}>👤 {state.user.name}</p>
          )}

          {/* Sélecteur de projet */}
          <div style={{ display:"flex", gap:8, marginTop:14 }}>
            <select value={state.activeProjectId} onChange={(e) => switchProject(Number(e.target.value))} style={{ flex:1, fontWeight:600 }}>
              {state.projects.map((p) => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
            <button className="btn btn-outline btn-sm" onClick={addProject} style={{ whiteSpace:"nowrap" }}>+ Employeur</button>
          </div>
          {msg.text && (
            <p className="mono" style={{ fontSize:12.5, color: msg.ok?"#1a7d3c":"#c0392b", margin:"10px 2px 0" }}>{msg.text}</p>
          )}
        </header>

        {/* Statistiques */}
        <div style={{ display:"grid", gridTemplateColumns: curMonthPay!=null ? "repeat(3,1fr)" : "repeat(2,1fr)", gap:10, marginBottom:24 }}>
          <StatCard label="Ce mois-ci" value={minToStr(curMonthTotal)} accent="azure" />
          <StatCard label="Total employeur" value={minToStr(grandTotal)} accent="carbon" />
          {curMonthPay != null && <StatCard label="Revenu estimé (mois)" value={euro(curMonthPay)} accent="pollen" />}
        </div>

        {/* 01 — Ajouter */}
        <section className="card" style={{ padding:22, marginBottom:26 }}>
          <SecHead num="01" label="// Nouvelle saisie" title="Ajouter des heures" />
          <div style={{ display:"grid", gap:15, marginTop:16 }}>
            <div>
              <Label>Date</Label>
              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} />
            </div>

            <div>
              <Label>Créneaux</Label>
              <div style={{ display:"grid", gap:8 }}>
                {slots.map((slot, i) => {
                  const dur = calcDuration(slot.start, slot.end);
                  return (
                    <div key={i} style={{ display:"flex", gap:8, alignItems:"center" }}>
                      <input type="time" value={slot.start} onChange={(e) => updateSlot(i,"start",e.target.value)} style={{ flex:1 }} />
                      <span className="mono" style={{ color:"var(--azure)", fontWeight:700, flexShrink:0 }}>→</span>
                      <input type="time" value={slot.end} onChange={(e) => updateSlot(i,"end",e.target.value)} style={{ flex:1 }} />
                      {dur != null && (
                        <div className="mono" style={{ background:"#eef2fb", color:"var(--azure)", borderRadius:8, padding:"6px 9px", fontSize:12.5, fontWeight:700, whiteSpace:"nowrap", flexShrink:0 }}>
                          {minToStr(dur)}
                        </div>
                      )}
                      {slots.length > 1 && (
                        <button onClick={() => removeSlot(i)} title="Retirer" style={{ background:"none", border:"none", cursor:"pointer", color:"#c8cad0", fontSize:22, padding:"0 2px", lineHeight:1, flexShrink:0 }}
                          onMouseOver={(e) => e.target.style.color="#c0392b"} onMouseOut={(e) => e.target.style.color="#c8cad0"}>×</button>
                      )}
                    </div>
                  );
                })}
              </div>
              <button onClick={addSlot} style={{ marginTop:8, background:"none", border:"1.5px dashed #cdd0d6", borderRadius:9, padding:"9px 14px", fontSize:13, color:"var(--gunmetal)", cursor:"pointer", width:"100%", fontFamily:"inherit" }}>
                + Ajouter un créneau
              </button>
            </div>

            {totalDuration > 0 && (
              <div className="mono" style={{ background:"#fff7e3", border:"1px solid #ffe6a8", borderRadius:10, padding:"10px 14px", fontSize:14, color:"#7a5a00", fontWeight:700 }}>
                ⏱ Total journée : {minToStr(totalDuration)}{computePay(totalDuration, rate)!=null ? ` · ${euro(computePay(totalDuration, rate))}` : ""}
              </div>
            )}

            <div>
              <Label>Description <span style={{ fontWeight:400, color:"#b3b6bd" }}>(optionnel)</span></Label>
              <input type="text" value={note} onChange={(e) => setNote(e.target.value)} placeholder="ex. tâche effectuée, chantier, mission..." />
            </div>

            {error && <p className="mono" style={{ color:"#c0392b", fontSize:13, margin:0 }}>{error}</p>}

            <button className="btn btn-primary" onClick={handleAdd} style={{ width:"100%" }}>Ajouter →</button>
          </div>
        </section>

        {/* 02 — Historique */}
        <section>
          <SecHead num="02" label="// Vos heures" title="Historique" />
          {monthKeys.length === 0 ? (
            <div className="mono" style={{ textAlign:"center", color:"#a7aab1", padding:"36px 0", fontSize:14 }}>
              Aucune heure enregistrée pour l'instant.
            </div>
          ) : monthKeys.map((key) => {
            const mTotal = totalMonth(key);
            const mPay = computePay(mTotal, rate);
            const open = !!expanded[key];
            const count = byMonth[key].length;
            return (
              <div key={key} style={{ marginTop:18, marginBottom:14 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", borderBottom:"2px solid var(--azure)", paddingBottom:8, marginBottom:12 }}>
                  <div onClick={() => toggleMonth(key)} role="button" style={{ display:"flex", alignItems:"baseline", gap:12, flexWrap:"wrap", cursor:"pointer", flex:1, minWidth:0 }}>
                    <span className="mono" style={{ fontSize:13, color:"var(--gunmetal)", alignSelf:"center", transform: open ? "rotate(90deg)" : "none", transition:"transform .15s", display:"inline-block" }}>▶</span>
                    <h3 style={{ fontFamily:"Inter", fontSize:17, fontWeight:700, margin:0 }}>{getMonthLabel(key)}</h3>
                    <span className="mono" style={{ fontSize:14, fontWeight:700, color:"var(--azure)" }}>{minToStr(mTotal)}</span>
                    {mPay != null && <span className="mono" style={{ fontSize:13, fontWeight:700, color:"#7a5a00", background:"#fff7e3", padding:"1px 8px", borderRadius:6 }}>{euro(mPay)}</span>}
                    {!open && <span className="mono" style={{ fontSize:12, color:"var(--muted)" }}>· {count} jour{count>1?"s":""}</span>}
                  </div>
                  <button className="btn btn-outline btn-sm" onClick={() => exportMonthPDF(key, byMonth[key], pdfMeta)} style={{ flexShrink:0 }}>↓ PDF</button>
                </div>

                {open && <div style={{ display:"grid", gap:8 }}>
                  {byMonth[key].map((entry) => (
                    <div key={entry.id} className="card" style={{ padding:"12px 14px", display:"flex", alignItems:"flex-start", gap:12, boxShadow:"none" }}>
                      <div className="mono" style={{ background:"#eef2fb", color:"var(--azure)", borderRadius:9, padding:"7px 10px", fontSize:14, fontWeight:700, minWidth:54, textAlign:"center", flexShrink:0, marginTop:2 }}>
                        {minToStr(entry.totalDuration)}
                      </div>
                      <div style={{ flex:1, minWidth:0 }}>
                        <div style={{ fontSize:14, fontWeight:600, textTransform:"capitalize", marginBottom:3 }}>{formatDate(entry.date)}</div>
                        {entry.slots.map((s, i) => (
                          <div key={i} className="mono" style={{ fontSize:12.5, color:"var(--muted)", lineHeight:1.8 }}>
                            {s.start} → {s.end} · <span style={{ color:"var(--gunmetal)", fontWeight:600 }}>{minToStr(s.duration)}</span>
                          </div>
                        ))}
                        {entry.note && <div style={{ fontSize:12.5, color:"var(--gunmetal)", marginTop:4, fontStyle:"italic" }}>{entry.note}</div>}
                      </div>
                      <button onClick={() => handleDelete(entry.id)} title="Supprimer"
                        style={{ background:"none", border:"none", cursor:"pointer", color:"#c8cad0", fontSize:20, padding:4, lineHeight:1, flexShrink:0 }}
                        onMouseOver={(e) => e.target.style.color="#c0392b"} onMouseOut={(e) => e.target.style.color="#c8cad0"}>×</button>
                    </div>
                  ))}
                </div>}
              </div>
            );
          })}
        </section>
      </div>

      {/* Footer */}
      <footer className="mono" style={{ textAlign:"center", padding:"22px 16px 26px", color:"#a7aab1", fontSize:12.5 }}>
        Propulsé par <a href="https://codepp.fr" target="_blank" rel="noopener" style={{ color:"var(--gunmetal)", fontWeight:600, textDecoration:"none" }}>Codepp</a>
      </footer>

      {/* Réglages */}
      {showSettings && (
        <Modal onClose={() => setShowSettings(false)}>
          <SecHead label="// Réglages" title="Paramètres" />

          <div style={{ display:"grid", gap:15, marginTop:16 }}>
            <div>
              <Label>Votre nom <span style={{ fontWeight:400, color:"#b3b6bd" }}>(affiché sur le PDF)</span></Label>
              <input type="text" value={state.user.name} onChange={(e) => setUserName(e.target.value)} placeholder="ex. Prénom Nom" />
            </div>

            <hr style={{ border:"none", borderTop:"1px solid var(--border)", margin:"2px 0" }} />
            <p className="eyebrow" style={{ margin:0 }}>// Employeur courant</p>

            <div>
              <Label>Nom de l'employeur</Label>
              <input type="text" value={activeProject.name} onChange={(e) => renameProject(e.target.value)} />
            </div>
            <div>
              <Label>Taux horaire <span style={{ fontWeight:400, color:"#b3b6bd" }}>(€/h, optionnel)</span></Label>
              <input type="number" min="0" step="0.01" value={rate == null ? "" : rate} onChange={(e) => setRate(e.target.value)} placeholder="ex. 12.50" />
            </div>
            <button className="btn btn-ghost btn-sm" onClick={deleteProject} style={{ color:"#c0392b", borderColor:"#f0d0cc" }}>Supprimer cet employeur</button>

            <hr style={{ border:"none", borderTop:"1px solid var(--border)", margin:"2px 0" }} />
            <p className="eyebrow" style={{ margin:0 }}>// Données</p>
            <p className="mono" style={{ margin:"-6px 0 0", fontSize:12, color:"var(--muted)", lineHeight:1.6 }}>
              Vos heures sont sauvegardées automatiquement dans ce navigateur. Utilisez la sauvegarde pour ne rien perdre ou transférer vers un autre appareil.
            </p>
            <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
              <button className="btn btn-outline btn-sm" onClick={exportBackup}>↓ Sauvegarde</button>
              <button className="btn btn-outline btn-sm" onClick={() => jsonRef.current.click()}>↑ Restaurer</button>
              <button className="btn btn-ghost btn-sm" onClick={exportCSV}>↓ CSV employeur</button>
              <button className="btn btn-ghost btn-sm" onClick={() => csvRef.current.click()}>↑ Importer CSV</button>
            </div>
            <input ref={jsonRef} type="file" accept=".json,application/json" onChange={handleImportBackup} style={{ display:"none" }} />
            <input ref={csvRef} type="file" accept=".csv" onChange={handleImportCSV} style={{ display:"none" }} />

            <button className="btn btn-primary" onClick={() => setShowSettings(false)} style={{ marginTop:4 }}>Fermer</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ---- Petits composants ----
function Label({ children }) {
  return <label style={{ display:"block", fontFamily:"Inter", fontSize:12, fontWeight:600, textTransform:"uppercase", letterSpacing:".6px", color:"var(--gunmetal)", marginBottom:6 }}>{children}</label>;
}
function SecHead({ num, label, title }) {
  return (
    <div>
      <p className="eyebrow">{label}</p>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        {num && <span className="sec-num">{num}</span>}
        <h2 className="sec-title">{title}</h2>
      </div>
    </div>
  );
}
function StatCard({ label, value, accent }) {
  const colors = { azure:"var(--azure)", pollen:"#7a5a00", carbon:"var(--carbon)" };
  const bg = { azure:"#fff", pollen:"#fff7e3", carbon:"#fff" };
  return (
    <div className="card" style={{ padding:"14px 15px", background: bg[accent] }}>
      <p className="mono" style={{ margin:0, fontSize:11, color:"var(--muted)", textTransform:"uppercase", letterSpacing:".5px" }}>{label}</p>
      <p className="mono" style={{ margin:"6px 0 0", fontSize:20, fontWeight:700, color: colors[accent], lineHeight:1.1 }}>{value}</p>
    </div>
  );
}
function Modal({ children, onClose }) {
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, background:"rgba(30,30,30,.45)", display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"5vh 14px", overflowY:"auto", zIndex:50 }}>
      <div onClick={(e) => e.stopPropagation()} className="card" style={{ width:"100%", maxWidth:460, padding:24, marginTop:0 }}>
        {children}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
